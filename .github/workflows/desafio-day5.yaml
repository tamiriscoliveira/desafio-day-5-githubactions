name: Desafio dia 5

on:
  workflow_dispatch:

jobs:

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npm run lint

  unit:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    outputs:
      coverage: ${{ steps.coverage.outputs.coverage }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        run: npm test -- --coverage

      - name: Get coverage
        id: coverage
        run: |
          RESULT=$(jq '.total.lines.pct' coverage/coverage-summary.json)
          echo "coverage=$RESULT" >> "$GITHUB_OUTPUT"

  docker:
    needs: unit
    if: ${{ needs.unit.outputs.coverage >= 80 }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          image="ghcr.io/${{ github.repository }}/teste_de_senha:${GITHUB_SHA}"
          docker build -t "$image" ./app
          docker push "$image"
